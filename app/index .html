<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f0f13">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AI画像生成ビルダー App | Prompt Builder Suite v3.2</title>
<style>
:root{
  --bg:#0f0f13; --surface:#1a1a22; --chip:#22222e; --border:#2a2a38;
  --text:#e8e4f0; --muted:#8880a0;
  --c-character:#f0a0c0; --c-outfit:#f0c060; --c-pose:#60c4e8;
  --c-background:#b8a0ff; --c-workspace:#80d4b0; --c-gacha:#f0855f;
  --a:#f0a0c0;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html{font-size:16px;}
body{
  margin:0; background:var(--bg); color:var(--text);
  font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","Yu Gothic UI",sans-serif;
  padding-bottom:calc(120px + env(safe-area-inset-bottom));
  touch-action:manipulation;
}
body[data-tool="character"]{--a:var(--c-character);}
body[data-tool="outfit"]{--a:var(--c-outfit);}
body[data-tool="pose"]{--a:var(--c-pose);}
body[data-tool="background"]{--a:var(--c-background);}
body[data-tool="workspace"]{--a:var(--c-workspace);}
body[data-tool="gacha"]{--a:var(--c-gacha);}
button{font-family:inherit; cursor:pointer;}
input,textarea{font-family:inherit; font-size:16px;}

/* ---- header ---- */
header{
  position:sticky; top:0; z-index:30;
  background:linear-gradient(to bottom, #0f0f13 70%, rgba(15,15,19,.92));
  backdrop-filter:blur(8px);
  padding:calc(10px + env(safe-area-inset-top)) 14px 8px;
  border-bottom:1px solid var(--border);
}
.hrow{display:flex; align-items:center; gap:10px; max-width:640px; margin:0 auto;}
.step-eyebrow{
  font-size:.62rem; letter-spacing:.18em; color:var(--a);
  text-transform:uppercase; font-weight:600;
}
.htitle{font-size:1.02rem; font-weight:700; line-height:1.2;}
.hleft{flex:1; min-width:0;}
.hbtn{
  width:38px; height:38px; border-radius:12px; border:1px solid var(--border);
  background:var(--surface); color:var(--text); font-size:1.05rem; flex:none;
  display:flex; align-items:center; justify-content:center;
}
.hbtn:active{border-color:var(--a); color:var(--a);}
.hbtn.on{border-color:var(--a); color:var(--a); background:var(--chip);}
#searchwrap{max-width:640px; margin:8px auto 0; display:none;}
#searchwrap.show{display:block;}
#searchbox{
  width:100%; padding:10px 14px; border-radius:12px;
  border:1px solid var(--border); background:var(--chip); color:var(--text);
}
#searchbox::placeholder{color:var(--muted);}
#searchbox:focus{outline:none; border-color:var(--a);}

/* ---- category tabs ---- */
#cattabs{
  position:sticky; top:0; z-index:25;
  display:flex; gap:8px; overflow-x:auto; padding:10px 14px;
  background:rgba(15,15,19,.94); backdrop-filter:blur(8px);
  scrollbar-width:none; border-bottom:1px solid var(--border);
}
#cattabs::-webkit-scrollbar{display:none;}
.cattab{
  flex:none; padding:7px 14px; border-radius:999px; font-size:.82rem;
  border:1px solid var(--border); background:var(--chip); color:var(--muted);
}
.cattab.on{border-color:var(--a); color:var(--a); background:color-mix(in srgb, var(--a) 12%, var(--chip));}

/* ---- main ---- */
main{max-width:640px; margin:0 auto; padding:14px;}
.card{
  background:var(--surface); border:1px solid var(--border);
  border-radius:16px; padding:14px; margin-bottom:12px;
}
.seclabel{
  display:flex; align-items:center; gap:8px;
  font-size:.85rem; font-weight:700; margin-bottom:10px; color:var(--text);
}
.seclabel .cnt{
  font-size:.7rem; color:var(--a); font-weight:600;
  border:1px solid color-mix(in srgb, var(--a) 40%, transparent);
  border-radius:999px; padding:1px 8px;
}
.seclabel .mode{font-size:.66rem; color:var(--muted); font-weight:400; margin-left:auto;}
.chips{display:flex; flex-wrap:wrap; gap:8px;}
.chip{
  padding:8px 13px; border-radius:999px; font-size:.85rem; line-height:1.3;
  border:1px solid var(--border); background:var(--chip); color:var(--text);
  transition:border-color .12s, background .12s;
}
.chip.on{
  border-color:var(--a);
  background:color-mix(in srgb, var(--a) 16%, var(--chip));
  color:var(--a); font-weight:600;
}
.freewrap{margin-top:2px;}
.freeinput{
  width:100%; padding:10px 13px; border-radius:12px;
  border:1px solid var(--border); background:var(--chip); color:var(--text);
}
.freeinput:focus{outline:none; border-color:var(--a);}
.hint{font-size:.72rem; color:var(--muted); margin-top:6px; line-height:1.5;}
.empty{color:var(--muted); font-size:.85rem; text-align:center; padding:30px 0;}

/* ---- workspace ---- */
.wspart{display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border);}
.wspart:last-child{border-bottom:none;}
.wsdot{width:9px; height:9px; border-radius:50%; flex:none;}
.wsname{font-size:.88rem; font-weight:700; flex:none;}
.wsprev{flex:1; min-width:0; font-size:.72rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.wscnt{font-size:.7rem; color:var(--muted); flex:none;}
.switch{
  width:42px; height:24px; border-radius:999px; border:1px solid var(--border);
  background:var(--chip); position:relative; flex:none; padding:0;
}
.switch::after{
  content:""; position:absolute; top:2px; left:2px; width:18px; height:18px;
  border-radius:50%; background:var(--muted); transition:transform .15s, background .15s;
}
.switch.on{background:color-mix(in srgb, var(--c-workspace) 25%, var(--chip)); border-color:var(--c-workspace);}
.switch.on::after{transform:translateX(18px); background:var(--c-workspace);}
.jump{
  border:none; background:none; color:var(--muted); font-size:1rem; padding:4px; flex:none;
}
.outta{
  width:100%; min-height:110px; border-radius:12px; resize:vertical;
  border:1px solid var(--border); background:var(--chip); color:var(--text);
  padding:10px 12px; font-size:.82rem; line-height:1.6;
}
.btnrow{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;}
.btn{
  padding:10px 16px; border-radius:12px; font-size:.86rem; font-weight:700;
  border:1px solid var(--border); background:var(--chip); color:var(--text);
}
.btn.primary{background:var(--a); border-color:var(--a); color:#0f0f13;}
.btn.small{padding:6px 12px; font-size:.76rem; font-weight:600;}
.btn:active{opacity:.8;}
.counts{font-size:.72rem; color:var(--muted); margin-top:8px;}
.histitem{
  padding:9px 0; border-bottom:1px solid var(--border); font-size:.76rem;
  color:var(--muted); display:flex; gap:8px; align-items:center;
}
.histitem:last-child{border-bottom:none;}
.histtext{flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.histtime{flex:none; font-size:.66rem;}

/* ---- output bar ---- */
#outbar{
  position:fixed; left:0; right:0; bottom:calc(56px + env(safe-area-inset-bottom));
  z-index:35; padding:0 10px;
}
#outbar .inner{
  max-width:640px; margin:0 auto;
  background:var(--surface); border:1px solid var(--border);
  border-top:2px solid var(--a);
  border-radius:14px; padding:9px 12px;
  display:flex; align-items:center; gap:10px;
  box-shadow:0 -4px 24px rgba(0,0,0,.45);
}
#outbar .tagbadge{
  flex:none; font-size:.68rem; font-weight:700; color:var(--a);
  border:1px solid color-mix(in srgb, var(--a) 45%, transparent);
  border-radius:999px; padding:2px 9px;
}
#outbar .prev{flex:1; min-width:0; font-size:.72rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
#outbar .obtn{border:none; background:none; color:var(--a); font-size:1.05rem; padding:4px; flex:none;}
#outpanel{
  max-width:640px; margin:0 auto 8px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px; padding:12px; display:none;
  box-shadow:0 -4px 24px rgba(0,0,0,.45);
}
#outpanel.show{display:block;}

/* ---- bottom nav ---- */
#bottomnav{
  position:fixed; left:0; right:0; bottom:0; z-index:40;
  background:rgba(20,20,27,.97); backdrop-filter:blur(10px);
  border-top:1px solid var(--border);
  padding-bottom:env(safe-area-inset-bottom);
}
#bottomnav .inner{max-width:640px; margin:0 auto; display:flex;}
.navbtn{
  flex:1; border:none; background:none; padding:7px 0 8px;
  display:flex; flex-direction:column; align-items:center; gap:3px;
  color:var(--muted); font-size:.66rem;
}
.navdot{width:5px; height:5px; border-radius:50%; background:transparent;}
.navbtn .navicon{font-size:1.15rem; line-height:1;}
.navbtn.on{color:var(--nc); font-weight:700;}
.navbtn.on .navdot{background:var(--nc);}

/* ---- sheet ---- */
#backdrop{
  position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:50;
  opacity:0; pointer-events:none; transition:opacity .18s;
}
#backdrop.show{opacity:1; pointer-events:auto;}
#sheet{
  position:fixed; left:0; right:0; bottom:0; z-index:51;
  background:var(--surface); border-top:1px solid var(--border);
  border-radius:20px 20px 0 0;
  max-height:78vh; overflow-y:auto; overscroll-behavior:contain;
  transform:translateY(105%); transition:transform .22s ease-out;
  padding:16px 16px calc(20px + env(safe-area-inset-bottom));
}
#sheet.show{transform:translateY(0);}
#sheet .grab{width:38px; height:4px; border-radius:99px; background:var(--border); margin:0 auto 14px;}
.sheettitle{font-size:.95rem; font-weight:700; margin-bottom:12px; display:flex; align-items:center; gap:8px;}
.pgroup{font-size:.7rem; letter-spacing:.12em; color:var(--muted); margin:14px 0 8px; font-weight:700;}
.pitem{
  display:flex; align-items:center; gap:10px; width:100%; text-align:left;
  background:var(--chip); border:1px solid var(--border); border-radius:12px;
  padding:11px 13px; margin-bottom:8px; color:var(--text);
}
.pitem:active{border-color:var(--a);}
.pname{font-size:.88rem; font-weight:700;}
.pdesc{font-size:.7rem; color:var(--muted); margin-top:2px;}
.pmain{flex:1; min-width:0;}
.pdel{border:none; background:none; color:var(--muted); font-size:1rem; padding:4px; flex:none;}
@media (prefers-reduced-motion: reduce){
  *{transition:none !important;}
}
</style>
</head>
<body data-tool="character">

<header>
  <div class="hrow">
    <div class="hleft">
      <div class="step-eyebrow" id="heyebrow">Step 1 · Character</div>
      <div class="htitle" id="htitle">キャラ・顔</div>
    </div>
    <button class="hbtn" id="btnsearch" title="タグ検索">🔍</button>
    <button class="hbtn" id="btngacha" title="おまかせガチャ">🎲</button>
    <button class="hbtn" id="btnpreset" title="プリセット">☰</button>
  </div>
  <div id="searchwrap"><input id="searchbox" placeholder="タグを日本語で検索（例：猫耳、桜、跪く）"></div>
</header>

<nav id="cattabs"></nav>
<main id="screen"></main>

<div id="outbar">
  <div id="outpanel">
    <textarea class="outta" id="outta" readonly></textarea>
    <div class="counts" id="outcounts"></div>
    <div class="btnrow">
      <button class="btn primary" id="btncopyout">コピー</button>
      <button class="btn" id="btntows">作業台で確認</button>
      <button class="btn" id="btnclear">このビルダーをクリア</button>
    </div>
  </div>
  <div class="inner" id="outbarinner">
    <span class="tagbadge" id="tagbadge">0タグ</span>
    <span class="prev" id="outprev">タグを選ぶとここにプロンプトが育ちます</span>
    <button class="obtn" id="btnbarcopy" title="コピー">⧉</button>
    <button class="obtn" id="btnexpand" title="展開">▴</button>
  </div>
</div>

<nav id="bottomnav"><div class="inner" id="navinner"></div></nav>

<div id="backdrop"></div>
<div id="sheet"><div class="grab"></div><div id="sheetbody"></div></div>
<div id="toast" style="position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:99;background:var(--surface);border:1px solid var(--a);color:var(--text);padding:9px 18px;border-radius:999px;font-size:.8rem;opacity:0;pointer-events:none;transition:opacity .2s;box-shadow:0 4px 20px rgba(0,0,0,.5);"></div>

/* ---------- helpers ---------- */
const $ = id => document.getElementById(id);
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg){
  const t = $('toast'); t.textContent = msg; t.style.opacity = '1';
  clearTimeout(t._tm); t._tm = setTimeout(()=>{ t.style.opacity='0'; }, 1800);
}
function copyText(text, msg){
  const done = ()=> toast(msg || 'コピーしました');
  const fb = ()=>{
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); done(); }catch(e){ toast('コピーできませんでした'); }
    document.body.removeChild(ta);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done, fb);
  }else fb();
}
function allSections(tool){
  const out = [];
  for(const c of DATA[tool].CATEGORIES) for(const s of c.sections) out.push(s);
  return out;
}
function findSection(tool, id){
  return allSections(tool).find(s=>s.id===id) || null;
}
function compose(tool){
  const parts = [];
  const sel = state.sel[tool];
  for(const id of DATA[tool].OUTPUT_ORDER){
    if(sel[id]) for(const en of sel[id]) parts.push(en);
  }
  // OUTPUT_ORDER外のセクション（保険）
  for(const id in sel){
    if(!DATA[tool].OUTPUT_ORDER.includes(id)) for(const en of sel[id]) parts.push(en);
  }
  if(state.free[tool] && state.free[tool].trim()) parts.push(state.free[tool].trim());
  return parts.join(', ');
}
function tagCount(text){
  return text ? text.split(',').map(s=>s.trim()).filter(Boolean).length : 0;
}
function wsCompose(){
  const parts = [];
  const q = DATA.workspace.QUALITY_PRESETS.find(p=>p.id===state.ws.quality);
  if(q && q.tags) parts.push(q.tags);
  for(const b of BUILDERS){
    if(state.ws.include[b]){
      const t = compose(b);
      if(t) parts.push(t);
    }
  }
  if(state.ws.enh.length) parts.push(state.ws.enh.join(', '));
  if(state.ws.free.trim()) parts.push(state.ws.free.trim());
  let tags = parts.join(', ').split(',').map(s=>s.trim()).filter(Boolean);
  if(state.ws.dedupe){
    const seen = new Set(); tags = tags.filter(t=>{ const k=t.toLowerCase(); if(seen.has(k)) return false; seen.add(k); return true; });
  }
  return tags.join(', ');
}
function negCompose(){
  let tags = [...state.ws.neg];
  if(state.ws.negFree.trim()) tags = tags.concat(state.ws.negFree.split(',').map(s=>s.trim()).filter(Boolean));
  const seen = new Set();
  return tags.filter(t=>{ const k=t.toLowerCase(); if(seen.has(k)) return false; seen.add(k); return true; }).join(', ');
}

/* ---------- render: builder screen ---------- */
function sectionCard(tool, s, filterQ){
  const sel = state.sel[tool][s.id] || [];
  let items = s.items;
  if(filterQ){
    items = items.filter(it=> it[0].includes(filterQ) || it[1].toLowerCase().includes(filterQ.toLowerCase()));
    if(!items.length) return '';
  }
  return `<div class="card">
    <div class="seclabel">${esc(s.label)}
      ${sel.length?`<span class="cnt">${sel.length}</span>`:''}
      <span class="mode">${s.single?'1つだけ':'複数OK'}</span>
    </div>
    <div class="chips">${items.map(it=>
      `<button class="chip ${sel.includes(it[1])?'on':''}" data-sec="${s.id}" data-en="${esc(it[1])}">${esc(it[0])}</button>`
    ).join('')}</div>
  </div>`;
}
function renderBuilder(){
  const tool = state.cur;
  let html = '';
  if(searchQ){
    let hit = 0;
    for(const c of DATA[tool].CATEGORIES) for(const s of c.sections){
      const card = sectionCard(tool, s, searchQ);
      if(card){ hit++; html += card; }
    }
    if(!hit) html = `<div class="empty">「${esc(searchQ)}」に合うタグがないみたいだ。<br>別の言葉で試してみて。</div>`;
  }else{
    const cat = DATA[tool].CATEGORIES.find(c=>c.tabId===state.tab[tool]) || DATA[tool].CATEGORIES[0];
    for(const s of cat.sections) html += sectionCard(tool, s, '');
    html += `<div class="card freewrap">
      <div class="seclabel">フリータグ<span class="mode">自由入力・カンマ区切り</span></div>
      <input class="freeinput" id="freeinput" value="${esc(state.free[tool])}" placeholder="例: holding a rose, wind effect">
      <div class="hint">ここに書いたタグは出力の最後に足されます。全カテゴリ共通。</div>
    </div>`;
  }
  $('screen').innerHTML = html;
  const fi = $('freeinput');
  if(fi) fi.addEventListener('change', e=>{ state.free[tool]=e.target.value; persist(); renderOutbar(); });
}

function openPresetSheet(){
  const tool = state.cur;
  if(tool==='workspace') return;
  const t = TOOLS.find(x=>x.id===tool);
  let html = `<div class="sheettitle"><span class="wsdot" style="background:${COLORS[tool]}"></span>${esc(t.label)}のプリセット</div>`;
  html += `<div class="btnrow" style="margin:0 0 6px;">
    <button class="btn primary" id="sheetSave">＋ 現在の選択を保存</button>
    <button class="btn" id="sheetReset">選択をリセット</button>
  </div>`;
  if(userPresets[tool].length){
    html += `<div class="pgroup">▸ マイプリセット</div>`;
    userPresets[tool].forEach((p,i)=>{
      html += `<div class="pitem"><div class="pmain" data-applyuser="${i}"><div class="pname">${esc(p.name)}</div></div>
        <button class="pdel" data-deluser="${i}">✕</button></div>`;
    });
  }
  const groups = DATA[tool].PRESET_GROUPS || null;
  const presets = DATA[tool].DEFAULT_PRESETS;
  if(groups){
    for(const g of groups){
      const list = presets.map((p,i)=>({p,i})).filter(x=>x.p.group===g.group);
      if(!list.length) continue;
      html += `<div class="pgroup">${esc(g.label)}</div>`;
      for(const x of list) html += presetItem(x.p, x.i);
    }
    const rest = presets.map((p,i)=>({p,i})).filter(x=>!groups.some(g=>g.group===x.p.group));
    if(rest.length){ html += `<div class="pgroup">▸ その他・追加分</div>`; for(const x of rest) html += presetItem(x.p, x.i); }
  }else{
    html += `<div class="pgroup">▸ ビルトイン</div>`;
    presets.forEach((p,i)=>{ html += presetItem(p,i); });
  }
  openSheet(html);
  $('sheetSave').addEventListener('click', ()=>{
    const name = prompt('プリセット名を入力');
    if(!name) return;
    userPresets[tool].push({ name, selections: JSON.parse(JSON.stringify(state.sel[tool])), free: state.free[tool] });
    persist(); toast('保存しました'); openPresetSheet();
  });
  $('sheetReset').addEventListener('click', ()=>{
    state.sel[tool]={}; state.free[tool]=''; persist(); renderScreen(); closeSheet(); toast('リセットしました');
  });
}

function presetItem(p,i){
  return `<div class="pitem"><div class="pmain" data-applybuiltin="${i}">
    <div class="pname">${esc(p.name)}</div>${p.description?`<div class="pdesc">${esc(p.description)}</div>`:''}
  </div></div>`;
}
function applyPreset(tool, p){
  state.sel[tool] = {};
  for(const k in p.selections) state.sel[tool][k] = [...p.selections[k]];
  if(p.free !== undefined) state.free[tool] = p.free;
  persist(); renderScreen(); closeSheet();
  toast('「'+p.name+'」を反映しました');
}
$('sheetbody').addEventListener('click', e=>{
  const tool = state.cur;
  const wm = e.target.closest('[data-wsmenu]');
  if(wm){
    const id = wm.dataset.wsmenu;
    if(id==='gacha') goGacha();
    else if(id==='clear') clearAll();
    else if(id==='saveset'){ closeSheet(); saveSet(); }
    else if(id==='opensets') openSetsSheet();
    else if(id==='history') openHistorySheet();
    else if(id==='about') openAboutSheet();
    return;
  }
  const sl = e.target.closest('[data-sheetload]');
  if(sl){
    const s = savedSets[+sl.dataset.sheetload];
    if(s && confirm('「'+s.name+'」を読み込む？ 現在の選択は上書きされます')){
      state.sel = JSON.parse(JSON.stringify(s.snap.sel));
      state.free = JSON.parse(JSON.stringify(s.snap.free));
      state.ws = JSON.parse(JSON.stringify(s.snap.ws));
      persist(); renderScreen(); closeSheet(); toast('読み込みました');
    }
    return;
  }
  const sd = e.target.closest('[data-sheetdelset]');
  if(sd){
    if(confirm('このセットを削除する？')){
      savedSets.splice(+sd.dataset.sheetdelset,1); persist(); renderScreen();
      savedSets.length ? openSetsSheet() : closeSheet();
    }
    return;
  }
  const sh = e.target.closest('[data-sheethist]');
  if(sh){ copyText(history[+sh.dataset.sheethist].text, '履歴からコピー'); return; }
  const ab = e.target.closest('[data-applybuiltin]');
  if(ab){ applyPreset(tool, DATA[tool].DEFAULT_PRESETS[+ab.dataset.applybuiltin]); return; }
  const au = e.target.closest('[data-applyuser]');
  if(au){ applyPreset(tool, userPresets[tool][+au.dataset.applyuser]); return; }
  const du = e.target.closest('[data-deluser]');
  if(du){
    if(confirm('このマイプリセットを削除する？')){
      userPresets[tool].splice(+du.dataset.deluser,1); persist(); openPresetSheet();
    }
    return;
  }
});

/* ---------- gacha engine ---------- */
// 男性系の性別が出た場合に髪型から除外する女性寄りタグ
const FEM_HAIR = new Set(['twintails','short twintails','low twintails','two side up',
  'twin braids','low twin braids','double hair buns','hime cut','drill hair','ringlets','french braid','crown braid']);
const MASC_GENDERS = new Set(['male','androgynous male']);
// キャラガチャの3モード: セクションIDごとの発火確率（未指定はデフォルト挙動）
const CHAR_MODES = {
  normal: { label:'通常キャラガチャ', desc:'人間キャラ中心。特殊パーツ・盛り要素は低確率',
    p:{ gender:.8, age:.85,
        kemonomimi:.07, hornsHalo:.02, wingsTail:.02, fangMark:.05,
        specialEye:.05, earrings:.15, glasses:.12,
        makeupStrength:.18, eyeMakeup:.15, lipMakeup:.15,
        hairAccent:.15, innerHairColor:.1 } },
  plain: { label:'装飾控えめガチャ', desc:'顔・髪・表情だけ。LoRA確認や顔テスト向け', max1:true,
    p:{ gender:.9, age:1, bodyType:.5,
        faceOverall:.7, faceShape:.3, jawline:.2, cheekNoseLips:.15,
        eyeShape:.6, gaze:.5, eyeColor:.9, pupilHighlight:.2, specialEye:0,
        eyebrows:.15, eyelids:.15, eyelashes:.15,
        baseExpression:.9, emotionAux:.15, mouth:.25,
        hairLength:1, hairTexture:.5, hairBangs:.5, hairStyle:.25, hairColor:1,
        hairAccent:0, innerHairColor:0,
        skinColor:.7, skinTexture:.3,
        makeupStrength:0, eyeMakeup:0, lipMakeup:0, glasses:0, earrings:0,
        kemonomimi:0, hornsHalo:0, wingsTail:0, fangMark:0,
        charaAura:.35, faceCorrection:.25 } },
  fantasy: { label:'人外・ファンタジーガチャ', desc:'けもみみ・角・翼・尻尾・特殊瞳を積極採用',
    p:{ gender:.8, age:.8,
        kemonomimi:.75, hornsHalo:.35, wingsTail:.5, fangMark:.45,
        specialEye:.6, hairAccent:.4, innerHairColor:.25 } },
};
function gachaOne(tool, mode){
  const m = (tool==='character' && CHAR_MODES[mode]) ? CHAR_MODES[mode] : null;
  const sel = {};
  let gender = null;
  for(const s of allSections(tool)){
    let pool = s.items;
    if(tool==='character' && s.id==='hairStyle' && gender && MASC_GENDERS.has(gender)){
      pool = s.items.filter(it=>!FEM_HAIR.has(it[1]));
      if(!pool.length) pool = s.items;
    }
    const pick = ()=> pool[Math.floor(Math.random()*pool.length)][1];
    const p = m && s.id in m.p ? m.p[s.id] : null;
    if(s.single){
      if(Math.random() < (p===null ? 0.55 : p)){
        const v = pick(); sel[s.id] = [v];
        if(s.id==='gender') gender = v;
      }
    }else{
      let k = 0;
      if(p===null){
        const r = Math.random();
        k = r < 0.55 ? 0 : (r < 0.87 ? 1 : 2);
      }else if(Math.random() < p){
        k = (!m.max1 && Math.random() < 0.25) ? 2 : 1;
      }
      if(k){
        const set = new Set();
        for(let i=0;i<k;i++) set.add(pick());
        sel[s.id] = [...set];
      }
    }
  }
  return sel;
}
// 各ビルダー画面の🎲: そのビルダーだけ即反映（キャラは通常モード）
function gacha(){
  if(state.cur==='workspace' || state.cur==='gacha'){ goGacha(); return; }
  state.sel[state.cur] = gachaOne(state.cur, 'normal');
  persist(); renderScreen();
  const t = TOOLS.find(x=>x.id===state.cur);
  toast('🎲 '+t.short+'だけガチャ（他は変えてないよ）');
}
function goGacha(){
  state.cur='gacha'; persist(); closeSheet(); renderAll(); window.scrollTo(0,0);
}
/* ---------- gacha tab (プレビュー式) ---------- */
let gpending = null; // {targets:[], mode, label, sel:{builder:selObj}} メモリのみ
const EN2JP = {};
for(const b of BUILDERS){
  EN2JP[b] = {};
  for(const s of allSections(b)) for(const it of s.items) EN2JP[b][it[1]] = it[0];
}
function doGacha(targets, mode, label){
  gpending = { targets, mode, label, sel:{} };
  for(const t of targets) gpending.sel[t] = gachaOne(t, t==='character' ? (mode||'normal') : null);
  renderScreen(); window.scrollTo(0,0);
}
function gachaAdopt(){
  if(!gpending) return;
  for(const t of gpending.targets) state.sel[t] = gpending.sel[t];
  const names = gpending.targets.map(t=>TOOLS.find(x=>x.id===t).short).join('・');
  gpending = null;
  persist(); renderScreen();
  toast(names+'に反映したよ。作業台で確認できる');
}
function gachaPendingText(t){
  const parts = [];
  const sel = gpending.sel[t];
  for(const id of DATA[t].OUTPUT_ORDER) if(sel[id]) for(const en of sel[id]) parts.push(en);
  for(const id in sel) if(!DATA[t].OUTPUT_ORDER.includes(id)) for(const en of sel[id]) parts.push(en);
  return parts;
}
function renderGacha(){
  let html = '';
  if(gpending){
    html += `<div class="card" style="border-color:color-mix(in srgb, var(--c-gacha) 55%, var(--border));">
      <div class="seclabel">🎲 ${esc(gpending.label)} の結果<span class="mode">まだ反映してないよ</span></div>`;
    for(const t of gpending.targets){
      const tl = TOOLS.find(x=>x.id===t);
      const ens = gachaPendingText(t);
      html += `<div style="margin:10px 0 4px;display:flex;align-items:center;gap:8px;">
        <span class="wsdot" style="background:${COLORS[t]}"></span>
        <span style="font-size:.8rem;font-weight:700;">${tl.short}</span>
        <span class="wscnt">${ens.length}タグ</span></div>
        <div class="chips">${ens.map(en=>`<span class="chip" style="pointer-events:none;">${esc(EN2JP[t][en]||en)}</span>`).join('')}</div>`;
    }
    html += `<div class="btnrow" style="margin-top:14px;">
      <button class="btn primary" id="gadopt">採用する</button>
      <button class="btn" id="gretry">もう一回</button>
      <button class="btn" id="gcancel">やめる</button>
    </div></div>`;
  }
  const gi = (act,name,desc,color)=>`<div class="pitem"><div class="pmain" data-gacha="${act}">
    <div class="pname">${color?`<span class="wsdot" style="background:${color};display:inline-block;margin-right:6px;"></span>`:''}${name}</div>
    ${desc?`<div class="pdesc">${desc}</div>`:''}</div></div>`;
  html += `<div class="card"><div class="seclabel">全部おまかせ</div>
    ${gi('all','🎲 全部おまかせガチャ','キャラ（通常モード）・衣装・ポーズ・背景をまとめて生成')}</div>`;
  html += `<div class="card"><div class="seclabel">キャラガチャ<span class="mode">モード選択</span></div>
    ${gi('char-normal',CHAR_MODES.normal.label,CHAR_MODES.normal.desc,COLORS.character)}
    ${gi('char-plain',CHAR_MODES.plain.label,CHAR_MODES.plain.desc,COLORS.character)}
    ${gi('char-fantasy',CHAR_MODES.fantasy.label,CHAR_MODES.fantasy.desc,COLORS.character)}</div>`;
  html += `<div class="card"><div class="seclabel">部分ガチャ</div>
    ${gi('one-outfit','衣装だけガチャ','',COLORS.outfit)}
    ${gi('one-pose','ポーズだけガチャ','',COLORS.pose)}
    ${gi('one-background','背景だけガチャ','',COLORS.background)}</div>`;
  html += `<div class="hint" style="padding:0 4px 8px;">結果はプレビュー表示。「採用する」を押すまで、いま組んでいる選択は変わらない。</div>`;
  $('screen').innerHTML = html;
}
/* ---------- すべてクリア ---------- */
function clearAll(){
  if(!confirm('すべての選択をクリアしますか？\n（保存セットとコピー履歴は残ります）')) return;
  for(const b of BUILDERS){ state.sel[b]={}; state.free[b]=''; }
  state.ws.enh=[]; state.ws.neg=[]; state.ws.negFree=''; state.ws.free='';
  state.ws.quality='standard';
  persist(); renderScreen(); closeSheet();
  toast('すべてクリアしました');
}

/* ---------- events ---------- */
$('navinner') && document.getElementById('bottomnav').addEventListener('click', e=>{
  const b = e.target.closest('[data-nav]');
  if(!b) return;
  state.cur = b.dataset.nav;
  searchQ=''; $('searchbox').value=''; $('searchwrap').classList.remove('show'); $('btnsearch').classList.remove('on');
  $('outpanel').classList.remove('show'); $('btnexpand').textContent='▴';
  persist(); renderAll(); window.scrollTo(0,0);
});
$('cattabs').addEventListener('click', e=>{
  const b = e.target.closest('[data-cat]');
  if(!b) return;
  state.tab[state.cur] = b.dataset.cat;
  persist(); renderCatTabs(); renderScreen(); window.scrollTo(0,0);
});
$('screen').addEventListener('click', e=>{
  // gacha page
  const ga = e.target.closest('[data-gacha]');
  if(ga){
    const a = ga.dataset.gacha;
    if(a==='all') doGacha(BUILDERS, 'normal', '全部おまかせ');
    else if(a.startsWith('char-')) doGacha(['character'], a.slice(5), CHAR_MODES[a.slice(5)].label);
    else if(a.startsWith('one-')) doGacha([a.slice(4)], null, TOOLS.find(t=>t.id===a.slice(4)).short+'だけガチャ');
    return;
  }
  if(e.target.id==='gadopt'){ gachaAdopt(); return; }
  if(e.target.id==='gretry'){ if(gpending) doGacha(gpending.targets, gpending.mode, gpending.label); return; }
  if(e.target.id==='gcancel'){ gpending=null; renderScreen(); return; }
  // builder chip
  const chip = e.target.closest('.chip[data-sec]');
  if(chip){
    const tool = state.cur, secId = chip.dataset.sec, en = chip.dataset.en;
    const s = findSection(tool, secId);
    const cur = state.sel[tool][secId] || [];
    if(cur.includes(en)){
      state.sel[tool][secId] = cur.filter(x=>x!==en);
      if(!state.sel[tool][secId].length) delete state.sel[tool][secId];
    }else{
      state.sel[tool][secId] = s && s.single ? [en] : [...cur, en];
    }
    persist(); renderScreen(); return;
  }
  // workspace controls
  const inc = e.target.closest('[data-wsinc]');
  if(inc){ const b=inc.dataset.wsinc; state.ws.include[b]=!state.ws.include[b]; persist(); renderScreen(); return; }
  const jp = e.target.closest('[data-jump]');
  if(jp){ state.cur=jp.dataset.jump; persist(); renderAll(); window.scrollTo(0,0); return; }
  const q = e.target.closest('[data-quality]');
  if(q){ state.ws.quality=q.dataset.quality; persist(); renderScreen(); return; }
  const en = e.target.closest('[data-enh]');
  if(en){
    const v=en.dataset.enh, a=state.ws.enh;
    state.ws.enh = a.includes(v) ? a.filter(x=>x!==v) : [...a,v];
    persist(); renderScreen(); return;
  }
  const ng = e.target.closest('[data-neg]');
  if(ng){
    const v=ng.dataset.neg, a=state.ws.neg;
    state.ws.neg = a.includes(v) ? a.filter(x=>x!==v) : [...a,v];
    persist(); renderScreen(); return;
  }
  const dd = e.target.closest('[data-dedupe]');
  if(dd){ state.ws.dedupe=!state.ws.dedupe; persist(); renderScreen(); return; }
  if(e.target.id==='wscopy'){
    const text = wsCompose();
    if(!text){ toast('まだタグがないよ'); return; }
    copyText(text, '最終プロンプトをコピー');
    const now = new Date();
    history.unshift({ t: (now.getMonth()+1)+'/'+now.getDate()+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0'), text });
    history = history.slice(0,10); persist(); renderScreen(); return;
  }
  if(e.target.id==='wsnegcopy'){ const t=negCompose(); if(t) copyText(t,'ネガティブをコピー'); else toast('まだタグがないよ'); return; }
  if(e.target.id==='wssaveset'){ saveSet(); return; }
  if(e.target.id==='wsclearall'){ clearAll(); return; }
  const ls = e.target.closest('[data-loadset]');
  if(ls){
    const s = savedSets[+ls.dataset.loadset];
    if(s && confirm('「'+s.name+'」を読み込む？ 現在の選択は上書きされます')){
      state.sel = JSON.parse(JSON.stringify(s.snap.sel));
      state.free = JSON.parse(JSON.stringify(s.snap.free));
      state.ws = JSON.parse(JSON.stringify(s.snap.ws));
      persist(); renderScreen(); toast('読み込みました');
    }
    return;
  }
  const ds = e.target.closest('[data-delset]');
  if(ds){ if(confirm('このセットを削除する？')){ savedSets.splice(+ds.dataset.delset,1); persist(); renderScreen(); } return; }
  const hi = e.target.closest('[data-hist]');
  if(hi){ copyText(history[+hi.dataset.hist].text, '履歴からコピー'); return; }
});
$('btnpreset').addEventListener('click', ()=>{ state.cur==='workspace' ? openWsMenu() : openPresetSheet(); });
$('btngacha').addEventListener('click', gacha);
$('btnsearch').addEventListener('click', ()=>{
  const w = $('searchwrap');
  const show = !w.classList.contains('show');
  w.classList.toggle('show', show);
  $('btnsearch').classList.toggle('on', show);
  if(show){ $('searchbox').focus(); }
  else { searchQ=''; $('searchbox').value=''; renderCatTabs(); renderScreen(); }
});
$('searchbox').addEventListener('input', e=>{
  searchQ = e.target.value.trim();
  renderCatTabs(); renderScreen();
});
$('btnexpand').addEventListener('click', ()=>{
  const p = $('outpanel');
  const show = !p.classList.contains('show');
  p.classList.toggle('show', show);
  $('btnexpand').textContent = show ? '▾' : '▴';
});
$('btnbarcopy').addEventListener('click', ()=>{
  const t = compose(state.cur);
  if(t) copyText(t); else toast('まだタグがないよ');
});
$('btncopyout').addEventListener('click', ()=>{
  const t = compose(state.cur);
  if(t) copyText(t); else toast('まだタグがないよ');
});
$('btntows').addEventListener('click', ()=>{
  state.cur='workspace'; $('outpanel').classList.remove('show'); $('btnexpand').textContent='▴';
  persist(); renderAll(); window.scrollTo(0,0);
});
$('btnclear').addEventListener('click', ()=>{
  if(confirm('このビルダーの選択を全部クリアする？')){
    state.sel[state.cur]={}; state.free[state.cur]='';
    persist(); renderScreen();
  }
});

renderAll();
</script>
</body>
</html>
