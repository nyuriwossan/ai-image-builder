<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outfit Prompt Builder v2</title>
<style>
:root {
  --bg:#0f0f13; --surface:#1a1a22; --border:#2a2a38;
  --text:#e8e4f0; --muted:#8880a0; --chip:#22222e;
  --accent:#f0c060; --purple:#b8a0ff; --green:#a8d880; --cyan:#60c4e8; --pink:#f0a0c0; --user:#80d4b0;
}
* { box-sizing:border-box; }
body {
  margin:0; min-height:100vh; background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,"Hiragino Sans","Yu Gothic",sans-serif;
}
header {
  border-bottom:1px solid var(--border); padding:18px 24px; position:sticky; top:0;
  background:rgba(15,15,19,.96); backdrop-filter:blur(8px); z-index:10;
}
.header-inner { max-width:760px; margin:0 auto; display:flex; align-items:center; gap:12px; }
.logo { font-size:22px; font-weight:700; letter-spacing:.08em; color:var(--accent); white-space:nowrap; }
.logo-sub { font-size:12px; color:var(--muted); letter-spacing:.14em; text-transform:uppercase; flex:1; }
button { font-family:inherit; }
.reset-btn {
  background:transparent; border:1px solid var(--border); border-radius:6px;
  padding:5px 14px; color:var(--muted); font-size:12px; cursor:pointer;
}
.reset-btn:hover { color:var(--text); border-color:var(--accent); }
main { max-width:760px; margin:0 auto; padding:28px 24px 80px; }
.tab-row {
  display:flex; gap:4px; margin-bottom:24px; border-bottom:1px solid var(--border); flex-wrap:wrap;
}
.tab-btn {
  background:transparent; border:none; border-bottom:2px solid transparent;
  padding:10px 12px; color:var(--muted); font-size:13px; cursor:pointer; font-weight:500; margin-bottom:-1px;
}
.tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:700; }
.tab-btn.output { color:var(--accent); }
.section { margin-bottom:22px; }
.label-row { display:flex; align-items:center; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
.label { font-size:11px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); }
.badge { font-size:10px; padding:2px 7px; border-radius:999px; background:var(--border); color:var(--muted); }
.badge.single { color:var(--accent); border:1px solid var(--accent); background:transparent; }
.badge.multi { color:var(--cyan); border:1px solid var(--cyan); background:transparent; }
.hint { font-size:10px; color:var(--muted); background:#22222e; border-radius:8px; padding:2px 8px; }
.chip-row { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
.chip {
  background:var(--chip); border:1px solid var(--border); border-radius:20px;
  padding:7px 14px; color:var(--muted); font-size:13px; transition:.15s; cursor:pointer;
}
.chip:hover { border-color:var(--accent); transform:translateY(-1px); }
.chip.active { background:#2c2415; border-color:var(--accent); color:var(--accent); font-weight:600; }
.notice {
  background:#241f14; border:1px solid rgba(240,192,96,.28); border-radius:8px;
  padding:9px 14px; margin-bottom:14px; font-size:11px; color:rgba(240,192,96,.9); line-height:1.6;
}
.copy-block { background:var(--surface); border:2px solid var(--accent); border-radius:12px; padding:16px 18px; margin-bottom:16px; }
.output-header { display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:10px; }
.output-label { font-size:11px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); }
.copy-btn,.save-btn {
  background:var(--accent); border:none; border-radius:8px; padding:8px 16px;
  color:#201704; font-size:13px; font-weight:700; cursor:pointer;
}
.copy-btn.done { background:#8f7438; color:#fff; }
textarea,input {
  width:100%; background:transparent; border:1px solid var(--border); color:var(--text);
  border-radius:10px; padding:12px; font-size:13px; line-height:1.7; font-family:inherit;
}
textarea { min-height:86px; resize:vertical; outline:none; }
textarea.output { border:none; padding:0; min-height:82px; }
.preset-group-title { font-size:12px; font-weight:700; margin:12px 0 8px; }
.preset-grid { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
.preset {
  background:transparent; border:1px dashed var(--border); border-radius:999px;
  color:var(--text); padding:7px 12px; cursor:pointer; font-size:12px; max-width:100%;
}
.preset:hover { transform:translateY(-1px); }
.preset.casual { color:var(--green); border-color:rgba(168,216,128,.45); background:rgba(168,216,128,.08); }
.preset.smart { color:var(--purple); border-color:rgba(184,160,255,.45); background:rgba(184,160,255,.08); }
.preset.work { color:var(--cyan); border-color:rgba(96,196,232,.45); background:rgba(96,196,232,.08); }
.preset.room { color:var(--pink); border-color:rgba(240,160,192,.45); background:rgba(240,160,192,.08); }
.preset.formal { color:var(--accent); border-color:rgba(240,192,96,.45); background:rgba(240,192,96,.08); }
.preset.special { color:var(--accent); border-color:rgba(240,192,96,.45); background:rgba(240,192,96,.08); }
.preset.japanese { color:var(--green); border-color:rgba(168,216,128,.45); background:rgba(168,216,128,.08); }
.preset.gothic { color:var(--purple); border-color:rgba(184,160,255,.45); background:rgba(184,160,255,.08); }
.preset.alice { color:var(--pink); border-color:rgba(240,160,192,.45); background:rgba(240,160,192,.08); }
.preset.fantasy { color:var(--cyan); border-color:rgba(96,196,232,.45); background:rgba(96,196,232,.08); }
.preset.user { color:var(--user); border-color:rgba(128,212,176,.45); background:rgba(128,212,176,.08); }
.delete-preset { border:none; background:transparent; color:var(--muted); cursor:pointer; margin-left:2px; }
.save-row { display:flex; gap:8px; margin-top:10px; }
.save-row input { flex:1; }
.tag-list { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
.tag-pill {
  font-size:11px; padding:5px 9px; border-radius:999px;
  background:rgba(240,192,96,.14); color:var(--accent); border:1px solid rgba(240,192,96,.28);
}
.live-preview {
  background:#12121a; border:1px solid var(--border); border-radius:10px;
  padding:12px; color:var(--text); font-size:12px; line-height:1.6; word-break:break-word;
}
.small-muted { color:var(--muted); font-size:12px; line-height:1.6; }
.home-link { font-size:11px; color:var(--muted); text-decoration:none; border:1px solid var(--border); border-radius:6px; padding:4px 10px; white-space:nowrap; }
.home-link:hover { color:var(--accent); border-color:var(--accent); }
</style>

<body>
<header>
  <div class="header-inner">
    <a class="home-link" href="index.html">← Top</a>
    <div class="logo">Outfit PB</div>
    <div class="logo-sub">Outfit Prompt Builder v2</div>
    <button class="reset-btn" id="resetBtn">リセット</button>
  </div>
</header>

const STORAGE_KEY = "outfit_pb_v2_user_presets";

const PRESET_GROUPS = [
  { group: "casual", label: "▸ 日常 / カジュアル" },
  { group: "smart", label: "▸ きれいめ / 都会系" },
  { group: "work", label: "▸ 仕事 / 制服" },
  { group: "room", label: "▸ 部屋着 / パジャマ" },
  { group: "formal", label: "▸ フォーマル" },
  { group: "special", label: "▸ 特殊衣装" },
  { group: "japanese", label: "▸ 和風 / 民族系" },
  { group: "gothic", label: "▸ ゴシック / ロリータ" },
  { group: "alice", label: "▸ 童話 / アリス系" },
  { group: "fantasy", label: "▸ ファンタジー / 世界観" },
];

let selections = {};
let activeTab = "main";
let userPresets = loadUserPresets();
let copiedKey = "";

function validSelections(obj) {
  return obj && typeof obj === "object" && !Array.isArray(obj) &&
    Object.values(obj).every(v => Array.isArray(v) && v.every(x => typeof x === "string"));
}

function validatePreset(p) {
  return p && typeof p === "object" && typeof p.name === "string" && validSelections(p.selections);
}

function loadUserPresets() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed)) return [];
    return parsed.filter(validatePreset).map(p => ({
      name:p.name,
      description:p.description || "",
      group:"user",
      selections:p.selections,
      builtIn:false
    }));
  } catch(e) {
    return [];
  }
}

function saveUserPresets() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(userPresets));
}

function splitTags(str) {
  return (str || "").split(",").map(t => t.trim()).filter(Boolean);
}

function buildPrompt(sel = selections) {
  const parts = [];
  OUTPUT_ORDER.forEach(key => {
    const tags = sel[key];
    if (tags && tags.length) tags.forEach(t => parts.push(t));
  });
  return [...new Set(parts)].filter(Boolean).join(", ");
}

function getAllSections() { return CATEGORIES.flatMap(c => c.sections); }
function getSection(id) { return getAllSections().find(sec => sec.id === id); }

function toggle(sectionId, value) {
  const section = getSection(sectionId);
  if (!section) return;
  const current = selections[sectionId] || [];
  if (section.single) {
    selections[sectionId] = current.includes(value) ? [] : [value];
  } else {
    selections[sectionId] = current.includes(value) ? current.filter(v => v !== value) : [...current, value];
  }
  render();
}

function loadPreset(preset) {
  selections = JSON.parse(JSON.stringify(preset.selections || {}));
  render();
}

function deleteUserPreset(index) {
  userPresets.splice(index, 1);
  saveUserPresets();
  render();
}

function resetAll() {
  selections = {};
  const input = document.getElementById("presetName");
  if (input) input.value = "";
  render();
}

async function copyText(text, key) {
  if (!text) return;
  if (navigator.clipboard) {
    try {
      await navigator.clipboard.writeText(text);
      copiedKey = key;
      render();
      setTimeout(() => { copiedKey = ""; render(); }, 1300);
      return;
    } catch(e) {
      fallbackCopy(text, key);
      return;
    }
  }
  fallbackCopy(text, key);
}

function fallbackCopy(text, key) {
  try {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    copiedKey = key;
    render();
    setTimeout(() => { copiedKey = ""; render(); }, 1300);
  } catch (e) {
    alert("コピーに失敗しました。出力欄を手動で選択してください。");
  }
}

function saveCurrentPreset() {
  const input = document.getElementById("presetName");
  const name = input.value.trim();
  if (!name) {
    alert("プリセット名を入力してください。");
    return;
  }
  userPresets.push({
    name,
    description:"",
    group:"user",
    selections: JSON.parse(JSON.stringify(selections)),
    builtIn:false
  });
  saveUserPresets();
  input.value = "";
  render();
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]));
}

function renderTabs() {
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = CATEGORIES.map(cat => `
    <button class="tab-btn ${activeTab === cat.tabId ? "active" : ""}" data-tab="${cat.tabId}">${escapeHtml(cat.tabLabel)}</button>
  `).join("") + `<button class="tab-btn output ${activeTab === "__output__" ? "active" : ""}" data-tab="__output__">▶ 出力</button>`;
  tabs.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      activeTab = btn.dataset.tab;
      render();
    });
  });
}

function renderSection(sec) {
  const selected = selections[sec.id] || [];
  const chips = sec.items.map(item => {
    const active = selected.includes(item.en);
    return `<button class="chip ${active ? "active" : ""}" data-section="${sec.id}" data-value="${escapeHtml(item.en)}">${escapeHtml(item.jp)}</button>`;
  }).join("");
  return `
    <div class="section">
      <div class="label-row">
        <div class="label">${escapeHtml(sec.label)}</div>
        <span class="badge ${sec.single ? "single" : "multi"}">${sec.single ? "1択" : "複数選択可"}</span>
        ${sec.hint ? `<span class="hint">${escapeHtml(sec.hint)}</span>` : ""}
      </div>
      <div class="chip-row">${chips}</div>
    </div>
  `;
}

function renderOutputTab() {
  const prompt = buildPrompt();
  const tags = splitTags(prompt);
  return `
    ${tags.length ? `
      <section class="section">
        <div class="label-row"><label class="label">出力中タグ</label></div>
        <div class="tag-list">${tags.map(t => `<span class="tag-pill">${escapeHtml(t)}</span>`).join("")}</div>
      </section>
    ` : ""}
    <div class="copy-block">
      <div class="output-header">
        <div class="output-label">Outfit Prompt</div>
        <button class="copy-btn ${copiedKey === "outfit" ? "done" : ""}" id="copyPrompt" ${!prompt ? "disabled" : ""}>${copiedKey === "outfit" ? "✓ コピー済" : "コピー"}</button>
      </div>
      <div class="small-muted" style="margin-bottom:8px;">Character / Face / Pose / Background Promptに合体する場合は、カンマ区切りのまま追加してください。</div>
      <textarea class="output" readonly>${escapeHtml(prompt || "（タグを選択するとここに出力されます）")}</textarea>
    </div>
  `;
}

function renderContent() {
  const content = document.getElementById("content");
  const cat = CATEGORIES.find(c => c.tabId === activeTab);

  if (activeTab === "__output__") {
    content.innerHTML = renderOutputTab();
    const btn = document.getElementById("copyPrompt");
    if (btn) btn.addEventListener("click", () => copyText(buildPrompt(), "outfit"));
    return;
  }

  if (!cat) return;
  let html = "";
  if (activeTab === "smallitems") {
    html += `<div class="notice">💡 ここは「身につける小物」用です。本・杖・傘・花束など、手に持つ小道具はPose Builder側で扱います。</div>`;
  }
  if (activeTab === "color") {
    html += `<div class="notice">💡 メインカラーは1択、差し色は複数選択できます。例：black + gold accents / navy + white accents。</div>`;
  }
  if (activeTab === "theme") {
    html += `<div class="notice">💡 アリス風は「Alice-inspired outfit + apron dress + white apron + puff sleeves + headband」のように、テーマと衣装要素を組み合わせると安定します。</div>`;
  }

  html += cat.sections.map(renderSection).join("");

  const prompt = buildPrompt();
  if (prompt) {
    html += `<section class="section"><div class="label-row"><label class="label">現在の出力</label></div><div class="live-preview">${escapeHtml(prompt)}</div></section>`;
  }

  content.innerHTML = html;
  content.querySelectorAll(".chip").forEach(btn => {
    btn.addEventListener("click", () => toggle(btn.dataset.section, btn.dataset.value));
  });
}

function renderPresetGroup(group, label) {
  const items = DEFAULT_PRESETS.filter(p => p.group === group);
  if (!items.length) return "";
  return `
    <div class="preset-group-title">${label}</div>
    <div class="preset-grid">
      ${items.map((p,i) => `<button class="preset ${group}" data-kind="${group}" data-index="${i}" title="${escapeHtml(p.description || "")}">${escapeHtml(p.name)}</button>`).join("")}
    </div>
  `;
}

function renderPresets() {
  const area = document.getElementById("presetArea");
  area.innerHTML = PRESET_GROUPS.map(g => renderPresetGroup(g.group, g.label)).join("") +
    (userPresets.length ? `
      <div class="preset-group-title">▸ マイプリセット</div>
      <div class="preset-grid">
        ${userPresets.map((p,i) => `
          <span>
            <button class="preset user" data-kind="user" data-index="${i}" title="${escapeHtml(p.description || "")}">${escapeHtml(p.name)}</button>
            <button class="delete-preset" data-delete="${i}">×</button>
          </span>
        `).join("")}
      </div>
    ` : "");

  area.querySelectorAll(".preset").forEach(btn => {
    btn.addEventListener("click", () => {
      const kind = btn.dataset.kind;
      const idx = Number(btn.dataset.index);
      if (kind === "user") {
        loadPreset(userPresets[idx]);
      } else {
        const groupItems = DEFAULT_PRESETS.filter(p => p.group === kind);
        loadPreset(groupItems[idx]);
      }
    });
  });

  area.querySelectorAll(".delete-preset").forEach(btn => {
    btn.addEventListener("click", e => {
      e.stopPropagation();
      deleteUserPreset(Number(btn.dataset.delete));
    });
  });
}

function render() {
  renderPresets();
  renderTabs();
  renderContent();
}

document.getElementById("resetBtn").addEventListener("click", resetAll);
document.getElementById("savePresetBtn").addEventListener("click", saveCurrentPreset);
render();
</script>
